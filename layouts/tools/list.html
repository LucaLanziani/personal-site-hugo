{{ define "main" }}
<h1>{{ .Title }}</h1>
<p>{{ .Description }}</p>

<div class="tools-list">
    {{ range .Pages }}
    {{ if ne .File.TranslationBaseName "_index" }}
    <div class="tool-item">
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        <p>{{ .Description }}</p>
    </div>
    {{ end }}
    {{ end }}
</div>
{{ end }}
